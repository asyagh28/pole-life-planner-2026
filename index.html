const QUOTES={it:["Il tuo corpo può farcela. È la tua mente che devi convincere.","Non aspettare di essere pronta. Inizia e diventa pronta nel processo.","Ogni trick che riesci a fare era impossibile finché non l'hai fatto.","La disciplina è scegliere tra ciò che vuoi ora e ciò che vuoi di più.","Il progresso richiede pazienza. La grandezza richiede costanza.","Non ti confrontare con gli altri. Confrontati con chi eri ieri.","Il dolore di oggi è la forza di domani.","Sii orgogliosa di quanto lontano sei arrivata.","La tua unica limitazione è quella che imponi tu stessa.","Non mollare mai qualcosa che vuoi davvero.","Credi in te anche quando nessun altro lo fa.","Respira. Fidati. Vola."],en:["Your body can do it. It's your mind you need to convince.","Don't wait until you're ready. Start and become ready in the process.","Every trick you can do was impossible until you did it.","Discipline is choosing between what you want now and what you want most.","Progress requires patience. Greatness requires consistency.","Don't compare yourself to others. Compare yourself to who you were yesterday.","Today's pain is tomorrow's strength.","Be proud of how far you've come.","Your only limitation is the one you impose on yourself.","Never give up on something you truly want.","Believe in yourself even when no one else does.","Breathe. Trust. Fly."],fr:["Ton corps peut le faire. C'est ton esprit que tu dois convaincre.","N'attends pas d'être prête. Commence et deviens prête dans le processus.","Chaque figure était impossible jusqu'à ce que tu le fasses.","La discipline c'est choisir entre ce que tu veux maintenant et le plus.","Le progrès demande de la patience. La grandeur demande de la constance.","Ne te compare pas aux autres. Compare-toi à qui tu étais hier.","La douleur d'aujourd'hui est la force de demain.","Sois fière de tout ce que tu as accompli.","Ta seule limite est celle que tu t'imposes.","N'abandonne jamais quelque chose que tu veux vraiment.","Crois en toi même quand personne d'autre ne le fait.","Respire. Fais confiance. Vole."],ar:["جسدك قادر على ذلك. عقلك هو ما تحتاجين إقناعه.","لا تنتظري. ابدئي وستصبحين مستعدة في العملية.","كل حركة تتقنينها كانت مستحيلة حتى فعلتيها.","الانضباط هو الاختيار بين ما تريدينه الآن وما تريدينه أكثر.","التقدم يتطلب الصبر. العظمة تتطلب الثبات.","لا تقارني نفسك. قارني نفسك بمن كنت بالأمس.","ألم اليوم هو قوة الغد.","كوني فخورة بمدى ما وصلت إليه.","قيدك الوحيد هو ما تفرضينه على نفسك.","لا تتخلي أبداً عن شيء تريدينه.","صدّقي في نفسك حتى حين لا يصدّق بك أحد.","تنفسي. ثقي. حلّقي."],de:["Dein Körper kann es. Dein Geist ist es, den du überzeugen musst.","Warte nicht bis du bereit bist. Fang an und werde bereit.","Jeder Trick war unmöglich bis du ihn gemacht hast.","Disziplin heißt wählen zwischen dem was du jetzt und am meisten willst.","Fortschritt braucht Geduld. Größe braucht Beständigkeit.","Vergleiche dich nicht mit anderen. Vergleiche dich mit gestern.","Der Schmerz von heute ist die Kraft von morgen.","Sei stolz wie weit du gekommen bist.","Deine einzige Grenze ist die die du dir selbst auferlegst.","Gib niemals auf was du wirklich willst.","Glaube an dich auch wenn niemand anderes es tut.","Atme. Vertraue. Fliege."],es:["Tu cuerpo puede hacerlo. Es tu mente la que necesitas convencer.","No esperes. Empieza y conviértete en lista en el proceso.","Cada truco era imposible hasta que lo hiciste.","La disciplina es elegir entre lo que quieres ahora y lo que más quieres.","El progreso requiere paciencia. La grandeza requiere constancia.","No te compares. Compárate con quien eras ayer.","El dolor de hoy es la fuerza de mañana.","Sé orgullosa de lo lejos que has llegado.","Tu única limitación es la que te impones.","Nunca renuncies a algo que realmente quieres.","Cree en ti misma incluso cuando nadie más lo hace.","Respira. Confía. Vuela."],pt:["Seu corpo consegue. É sua mente que você precisa convencer.","Não espere estar pronta. Comece e torne-se pronta no processo.","Todo truque era impossível até que você o fez.","Disciplina é escolher entre o que quer agora e o que quer mais.","O progresso requer paciência. A grandeza requer consistência.","Não se compare. Compare-se com quem você era ontem.","A dor de hoje é a força de amanhã.","Seja orgulhosa de o quanto chegou.","Sua única limitação é a que você impõe a si mesma.","Nunca desista de algo que realmente quer.","Acredite em você mesmo quando ninguém mais acredita.","Respire. Confie. Voe."],nl:["Jouw lichaam kan het. Het is je geest die je moet overtuigen.","Wacht niet. Begin en word klaar in het proces.","Elke trick was onmogelijk totdat je het deed.","Discipline is kiezen tussen wat je nu en het meest wilt.","Vooruitgang vraagt geduld. Grootsheid vraagt consistentie.","Vergelijk jezelf niet. Vergelijk jezelf met gisteren.","De pijn van vandaag is de kracht van morgen.","Wees trots op hoe ver je gekomen bent.","Je enige beperking is degene die je jezelf oplegt.","Geef nooit op iets dat je echt wilt.","Geloof in jezelf ook als niemand anders dat doet.","Adem. Vertrouw. Vlieg."]};

const DAILY_Q={it:["Qual è una cosa che posso fare oggi per avvicinarmi al mio obiettivo?","Come voglio sentirmi stasera?","Cosa mi impedisce di crescere e cosa posso cambiare?","Chi voglio essere oggi — non cosa, ma chi?","C'è qualcosa che rimando che posso fare oggi?","Cosa mi dà più energia in questo periodo?","Se non avessi paura, cosa farei oggi?","Di cosa sono più orgogliosa?","Sto allenando il corpo o anche la mente?","Come sto trattando me stessa oggi?","Cosa voglio imparare oggi?","Qual è la mia intenzione per le prossime 24 ore?"],en:["What is one thing I can do today to get closer to my goal?","How do I want to feel tonight?","What is blocking my growth and what can I change?","Who do I want to be today — not what, but who?","Is there something I've been putting off?","What gives me the most energy right now?","If I had no fear, what would I do today?","What am I most proud of?","Am I training my body or also my mind?","How am I treating myself today?","What do I want to learn today?","What is my intention for the next 24 hours?"],fr:["Quelle est une chose que je peux faire aujourd'hui pour me rapprocher de mon objectif?","Comment est-ce que je veux me sentir ce soir?","Qu'est-ce qui bloque ma croissance?","Qui est-ce que je veux être aujourd'hui?","Y a-t-il quelque chose que je reporte?","Qu'est-ce qui me donne le plus d'énergie?","Si je n'avais pas peur, que ferais-je?","De quoi suis-je la plus fière?","Est-ce que j'entraîne aussi mon esprit?","Comment est-ce que je me traite?","Que veux-je apprendre aujourd'hui?","Quelle est mon intention pour les prochaines 24h?"],ar:["ما هو شيء واحد يمكنني فعله اليوم للاقتراب من هدفي؟","كيف أريد أن أشعر الليلة؟","ما الذي يعيق نموي؟","من أريد أن أكون اليوم؟","هل هناك شيء أؤجله؟","ما الذي يعطيني أكبر قدر من الطاقة؟","لو لم يكن لديّ خوف، ماذا كنت سأفعل؟","بماذا أفخر أكثر؟","هل أدرب عقلي أيضاً؟","كيف أعامل نفسي؟","ماذا أريد أن أتعلم اليوم؟","ما هي نيتي للـ 24 ساعة القادمة؟"],de:["Was ist eine Sache die ich heute tun kann const POLE_TIPS={it:[{t:"Riscaldamento obbligatorio",b:"Non saltare mai il riscaldamento! Almeno 10-15 min di cardio leggero + mobilità articolare prima di toccare il palo."},{t:"Grip: naturale vs chalk",b:"Sudi troppo? Usa chalk di magnesio. Hai la pelle secca? Lascia il palmo nudo. Il grip varia con temperatura e umidità."},{t:"Progressione graduale",b:"Impara prima la tecnica, poi aggiungi forza. Un trick eseguito male porta agli infortuni. Rispetta i prerequisiti."},{t:"Recovery è allenamento",b:"I muscoli crescono nel riposo. Pianifica 1-2 giorni di riposo attivo a settimana: foam rolling, bagni Epsom, sonno."},{t:"Pelle & bruises",b:"I lividi sono normali, le abrasioni no. Idrata la pelle ogni sera con olio di jojoba o rosehip oil."},{t:"Simmetria laterale",b:"Allenati sempre su entrambi i lati! La dominanza laterale crea squilibri muscolari."},{t:"Nutrizione per pole",b:"Mangia 2h prima dell'allenamento. Evita cibi grassi che compromettono il grip sulla pelle."},{t:"Video log mensile",b:"Registrati ogni mese per vedere i progressi reali. Il video non mente."},{t:"Palo statico vs rotante",b:"Il palo statico richiede più forza. Impara prima sullo statico, poi passa al rotante."},{t:"Grip training",b:"Allenala con: dead hang, towel pull-up, squeeze ball. Mani più forti = tricks più sicuri."},{t:"Prevenzione infortuni",b:"I più comuni: polso, spalla, ginocchio. Mai allenarsi con dolore acuto."},{t:"Mentalità da atleta",b:"Il pole è uno sport. Programma le sessioni, traccia i progressi, riposa, mangia bene."}],en:[{t:"Warm-up is mandatory",b:"Never skip warm-up! At least 10-15 min of light cardio + joint mobility before touching the pole."},{t:"Grip: natural vs chalk",b:"Sweating too much? Use magnesium chalk. Dry skin? Go bare palm. Grip changes with temperature."},{t:"Gradual progression",b:"Learn technique first, then add strength. A poorly executed trick leads to injuries."},{t:"Recovery is training",b:"Muscles grow at rest. Plan 1-2 active recovery days per week."},{t:"Skin & bruises",b:"Bruises are normal, abrasions are not. Moisturize skin every evening."},{t:"Lateral symmetry",b:"Always train both sides! Lateral dominance creates muscular imbalances."},{t:"Nutrition for pole",b:"Eat 2h before training. Avoid fatty foods that compromise grip."},{t:"Monthly video log",b:"Record yourself every month to see real progress."},{t:"Static vs spinning pole",b:"Static pole requires more strength. Learn on static first."},{t:"Grip training",b:"Train it with: dead hang, towel pull-ups, squeeze ball."},{t:"Injury prevention",b:"Most common: wrist, shoulder, knee. Never train with acute pain."},{t:"Athlete mindset",b:"Pole is a sport. Schedule sessions, track progress, rest, eat well."}],fr:[{t:"Échauffement obligatoire",b:"Ne jamais sauter l'échauffement! Au moins 10-15 min."},{t:"Grip",b:"Trop de transpiration? Chalk de magnésium. Peau sèche? Paume nue."},{t:"Progression graduelle",b:"Technique d'abord, force ensuite. Respectez les prérequis."},{t:"Récupération",b:"Les muscles grandissent au repos. 1-2 jours de récupération active."},{t:"Peau",b:"Les bleus sont normaux. Hydratez chaque soir."},{t:"Symétrie latérale",b:"Entraînez-vous des deux côtés!"},{t:"Nutrition",b:"Mangez 2h avant. Évitez les aliments gras."},{t:"Vidéo mensuelle",b:"Filmez-vous chaque mois."},{t:"Pole fixe vs rotatif",b:"Apprenez sur fixe d'abord."},{t:"Entraînement grip",b:"Dead hang, traction serviette, balle."},{t:"Prévention blessures",b:"Poignet, épaule, genou. Jamais avec douleur aiguë."},{t:"Mentalité",b:"Le pole est un sport."}],ar:[{t:"الإحماء إلزامي",b:"لا تتخطي الإحماء أبداً! 10-15 دقيقة على الأقل."},{t:"القبضة",b:"تعرقين؟ استخدمي تشوك المغنيسيوم. جلد جاف؟ الكف عارية."},{t:"التقدم التدريجي",b:"تعلمي التقنية أولاً ثم أضيفي القوة."},{t:"التعافي تدريب",b:"العضلات تنمو في الراحة."},{t:"الجلد",b:"الكدمات طبيعية. رطّبي جلدك كل مساء."},{t:"التناسق الجانبي",b:"تدربي على كلا الجانبين!"},{t:"التغذية",b:"كلي قبل ساعتين."},{t:"فيديو شهري",b:"صوري نفسك كل شهر."},{t:"العمود الثابت",b:"تعلمي على الثابت أولاً."},{t:"تدريب القبضة",b:"Dead hang وسحب بمنشفة."},{t:"الوقاية",b:"المعصم والكتف والركبة. لا تتدربي مع ألم حاد."},{t:"العقلية",b:"الرقص على العمود رياضة."}],de:[{t:"Aufwärmen Pflicht",b:"Niemals überspringen! Mindestens 10-15 Min."},{t:"Grip",b:"Zu viel Schweiß? Chalk. Trockene Haut? Nackte Handfläche."},{t:"Graduelle Progression",b:"Erst Technik, dann Kraft."},{t:"Erholung ist Training",b:"Muskeln wachsen in der Ruhe."},{t:"Haut",b:"Blutergüsse normal, Schürfwunden nicht."},{t:"Laterale Symmetrie",b:"Immer beide Seiten trainieren!"},{t:"Ernährung",b:"2h vor Training essen."},{t:"Monatliches Video",b:"Sich jeden Monat filmen."},{t:"Statisches Pole",b:"Erst auf statisch lernen."},{t:"Grip-Training",b:"Dead Hang, Handtuch, Quetschball."},{t:"Verletzungsprävention",b:"Handgelenk, Schulter, Knie."},{t:"Athleten-Mentalität",b:"Pole ist ein Sport."}],es:[{t:"Calentamiento obligatorio",b:"¡Nunca lo saltes! Al menos 10-15 min."},{t:"Grip",b:"¿Sudas mucho? Chalk de magnesio. ¿Piel seca? Palma desnuda."},{t:"Progresión gradual",b:"Técnica primero, fuerza después."},{t:"Recuperación",b:"Los músculos crecen en reposo."},{t:"Piel",b:"Los moretones son normales."},{t:"Simetría lateral",b:"¡Entrena siempre ambos lados!"},{t:"Nutrición",b:"Come 2h antes."},{t:"Video mensual",b:"Grábate cada mes."},{t:"Pole estático",b:"Aprende en estático primero."},{t:"Grip training",b:"Dead hang, jalón con toalla."},{t:"Prevención lesiones",b:"Muñeca, hombro, rodilla."},{t:"Mentalidad",b:"El pole es un deporte."}],pt:[{t:"Aquecimento obrigatório",b:"Nunca pule! Pelo menos 10-15 min."},{t:"Grip",b:"Suando muito? Chalk de magnésio. Pele seca? Palma nua."},{t:"Progressão gradual",b:"Técnica primeiro, força depois."},{t:"Recuperação é treino",b:"Músculos crescem no repouso."},{t:"Pele",b:"Hematomas são normais."},{t:"Simetria lateral",b:"Sempre treine dos dois lados!"},{t:"Nutrição",b:"Coma 2h antes."},{t:"Log de vídeo",b:"Grave-se todo mês."},{t:"Pole estático",b:"Aprenda no estático primeiro."},{t:"Treino de grip",b:"Dead hang, remada toalha."},{t:"Prevenção",b:"Pulso, ombro, joelho."},{t:"Mentalidade",b:"Pole é esporte."}],nl:[{t:"Opwarming verplicht",b:"Nooit overslaan! Minstens 10-15 min."},{t:"Grip",b:"Te veel zweet? Chalk. Droge huid? Kale palm."},{t:"Geleidelijke progressie",b:"Eerst techniek, dan kracht."},{t:"Herstel is training",b:"Spieren groeien in rust."},{t:"Huid",b:"Blauwe plekken zijn normaal."},{t:"Laterale symmetrie",b:"Altijd beide kanten trainen!"},{t:"Voeding",b:"2u voor training eten."},{t:"Maandelijkse video",b:"Elke maand filmen."},{t:"Statische pole",b:"Eerst op statisch leren."},{t:"Grip training",b:"Dead hang, handdoek pull-ups."},{t:"Blessurepreventie",b:"Pols, schouder, knie."},{t:"Mindset",b:"Pole is een sport."}]};

const MINDSET_T={it:[{i:"🧠",t:"Visualizzazione",b:"Prima di ogni sessione, chiudi gli occhi 2-3 minuti e visualizza il trick che vuoi eseguire. Immagina ogni dettaglio."},{i:"🔥",t:"Flow state",b:"Il flow si raggiunge quando la sfida supera leggermente le tue capacità. Scegli tricks appena fuori dalla comfort zone."},{i:"🌊",t:"Gestire la paura",b:"La paura è normale. Tecnica: respira 4 sec, espira 6 sec. Agisci con la paura, non contro di essa."},{i:"💬",t:"Self-talk positivo",b:"Sostituisci 'non riuscirò mai' con 'sto ancora imparando'. Il cervello crede a ciò che gli dici."},{i:"🎯",t:"Obiettivi micro",b:"Un obiettivo grande si raggiunge con micro-goals settimanali. Ogni piccolo step conta."},{i:"😤",t:"Resilienza",b:"Cadere fa parte del processo. Ogni volta che riesegui dopo una caduta, alleni la resilienza mentale."},{i:"🌸",t:"Body neutrality",b:"Il pole non è fatto per un tipo di corpo: è fatto per il tuo corpo. Smetti di confrontarti."},{i:"😴",t:"Sonno & performance",b:"Dormire meno di 7 ore riduce la forza del 20%. Il sonno è allenamento."},{i:"🧘",t:"Respirazione",b:"Inspira 4 sec, trattieni 2, espira 6. Abbassa il cortisolo, aumenta la concentrazione."}],en:[{i:"🧠",t:"Visualization",b:"Before each session, close your eyes 2-3 min and visualize the trick. Imagine every detail."},{i:"🔥",t:"Flow state",b:"Flow is reached when the challenge slightly exceeds your abilities. Choose tricks just outside your comfort zone."},{i:"🌊",t:"Managing fear",b:"Fear is normal. Technique: breathe 4 sec, exhale 6 sec. Act with the fear."},{i:"💬",t:"Positive self-talk",b:"Replace 'I'll never get this' with 'I'm still learning'. Your brain believes what you tell it."},{i:"🎯",t:"Micro goals",b:"A big goal is reached through weekly micro-goals. Every small step counts."},{i:"😤",t:"Resilience",b:"Falling is part of the process. Every retry trains mental resilience."},{i:"🌸",t:"Body neutrality",b:"Pole is not made for one body type: it's made for your body. Stop comparing."},{i:"😴",t:"Sleep & performance",b:"Less than 7 hours of sleep reduces strength by 20%. Sleep is training."},{i:"🧘",t:"Breathing",b:"Inhale 4 sec, hold 2, exhale 6. Lowers cortisol, increases concentration."}],fr:[{i:"🧠",t:"Visualisation",b:"Avant chaque séance, fermez les yeux 2-3 min et visualisez la figure."},{i:"🔥",t:"Flow state",b:"Le flow est atteint quand le défi dépasse légèrement vos capacités."},{i:"🌊",t:"Gérer la peur",b:"La peur est normale. Inspirez 4 sec, expirez 6 sec."},{i:"💬",t:"Self-talk positif",b:"Remplacez 'je n'y arriverai jamais' par 'j'apprends encore'."},{i:"🎯",t:"Micro objectifs",b:"Un grand objectif s'atteint avec des micro-objectifs hebdomadaires."},{i:"😤",t:"Résilience",b:"Tomber fait partie du processus."},{i:"🌸",t:"Neutralité corporelle",b:"Le pole est fait pour votre corps. Arrêtez de vous comparer."},{i:"😴",t:"Sommeil",b:"Moins de 7h réduit la force de 20%."},{i:"🧘",t:"Respiration",b:"Inspirez 4 sec, retenez 2, expirez 6."}],ar:[{i:"🧠",t:"التصور",b:"قبل كل جلسة، أغمضي عينيك 2-3 دقائق وتخيلي الحركة."},{i:"🔥",t:"حالة الانسياب",b:"تتحقق عندما يتجاوز التحدي قليلاً قدراتك."},{i:"🌊",t:"إدارة الخوف",b:"الخوف طبيعي. تنفس 4 ثوان، زفير 6 ثوان."},{i:"💬",t:"الحديث الذاتي",b:"استبدلي 'لن أنجح' بـ 'ما زلت أتعلم'."},{i:"🎯",t:"أهداف صغيرة",b:"الهدف الكبير يتحقق من خلال أهداف أسبوعية صغيرة."},{i:"😤",t:"المرونة",b:"السقوط جزء من العملية."},{i:"🌸",t:"حياد الجسم",b:"الرقص على العمود لجسدك أنت. توقفي عن المقارنة."},{i:"😴",t:"النوم",b:"أقل من 7 ساعات يقلل القوة 20٪."},{i:"🧘",t:"التنفس",b:"شهيق 4 ثوان، احتباس 2، زفير 6."}],de:[{i:"🧠",t:"Visualisierung",b:"Schließe vor jeder Session 2-3 Min die Augen und visualisiere den Trick."},{i:"🔥",t:"Flow State",b:"Flow entsteht wenn die Herausforderung deine Fähigkeiten leicht übersteigt."},{i:"🌊",t:"Angst bewältigen",b:"Angst ist normal. 4 Sek einatmen, 6 Sek ausatmen."},{i:"💬",t:"Positives Selbstgespräch",b:"Ersetze 'Das schaffe ich nie' durch 'Ich lerne noch'."},{i:"🎯",t:"Mikroziele",b:"Ein großes Ziel wird durch wöchentliche Mikroziele erreicht."},{i:"😤",t:"Resilienz",b:"Fallen gehört dazu."},{i:"🌸",t:"Körperneutralität",b:"Pole ist für deinen Körper. Hör auf zu vergleichen."},{i:"😴",t:"Schlaf",b:"Weniger als 7h reduziert Kraft um 20%."},{i:"🧘",t:"Atmung",b:"4 Sek einatmen, 2 halten, 6 ausatmen."}],es:[{i:"🧠",t:"Visualización",b:"Antes de cada sesión, cierra los ojos 2-3 min y visualiza el truco."},{i:"🔥",t:"Flow state",b:"El flow se alcanza cuando el desafío supera ligeramente tus capacidades."},{i:"🌊",t:"Gestionar el miedo",b:"El miedo es normal. Respira 4 seg, exhala 6 seg."},{i:"💬",t:"Self-talk positivo",b:"Reemplaza 'nunca lo lograré' por 'todavía estoy aprendiendo'."},{i:"🎯",t:"Micro objetivos",b:"Un gran objetivo se alcanza con micro-objetivos semanales."},{i:"😤",t:"Resiliencia",b:"Caer es parte del proceso."},{i:"🌸",t:"Neutralidad corporal",b:"El pole está hecho para tu cuerpo. Deja de compararte."},{i:"😴",t:"Sueño",b:"Menos de 7h reduce la fuerza un 20%."},{i:"🧘",t:"Respiración",b:"Inhala 4 seg, retén 2, exhala 6."}],pt:[{i:"🧠",t:"Visualização",b:"Antes de cada sessão, feche os olhos 2-3 min e visualize o truque."},{i:"🔥",t:"Flow state",b:"Flow ocorre quando o desafio supera levemente suas capacidades."},{i:"🌊",t:"Gerenciar o medo",b:"Medo é normal. Respire 4 seg, expire 6 seg."},{i:"💬",t:"Auto-fala positiva",b:"Substitua 'nunca vou conseguir' por 'ainda estou aprendendo'."},{i:"🎯",t:"Micro objetivos",b:"Um grande objetivo é alcançado por micro-objetivos semanais."},{i:"😤",t:"Resiliência",b:"Cair faz parte do processo."},{i:"🌸",t:"Neutralidade corporal",b:"O pole é feito para o seu corpo. Pare de se comparar."},{i:"😴",t:"Sono",b:"Menos de 7h reduz a força em 20%."},{i:"🧘",t:"Respiração",b:"Inspire 4 seg, segure 2, expire 6."}],nl:[{i:"🧠",t:"Visualisatie",b:"Sluit voor elke sessie 2-3 min je ogen en visualiseer de trick."},{i:"🔥",t:"Flow state",b:"Flow ontstaat wanneer de uitdaging je vaardigheden licht overstijgt."},{i:"🌊",t:"Angst beheersen",b:"Angst is normaal. 4 sec inademen, 6 sec uitademen."},{i:"💬",t:"Positieve zelfpraat",b:"Vervang 'dat lukt me nooit' door 'ik ben nog aan het leren'."},{i:"🎯",t:"Micro doelen",b:"Een groot doel wordt bereikt met wekelijkse micro-doelen."},{i:"😤",t:"Veerkracht",b:"Vallen hoort erbij."},{i:"🌸",t:"Lichaamsneutraliteit",b:"Pole is gemaakt voor jouw lichaam. Stop met vergelijken."},{i:"😴",t:"Slaap",b:"Minder dan 7u vermindert kracht met 20%."},{i:"🧘",t:"Ademhaling",b:"4 sec inademen, 2 vasthouden, 6 uitademen."}]};

function getDayIndex(dateStr){
  const[y,m,d]=dateStr.split("-").map(Number);
  return Math.max(0,Math.floor((new Date(y,m-1,d)-new Date(2026,0,1))/(86400000)));
}
function getDaysInMonth(m){
  const days=[],first=new Date(2026,m,1).getDay(),offset=(first+6)%7,total=new Date(2026,m+1,0).getDate();
  for(let i=0;i<offset;i++) days.push(null);
  for(let i=1;i<=total;i++) days.push(i);
  return days;
}

// ── RENDER HELPERS ────────────────────────────────────────────────────
const h=(tag,attrs,...children)=>{
  const el=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object"){Object.assign(el.style,v);}
    else if(k.startsWith("on")&&typeof v==="function"){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==="className"){el.className=v;}
    else if(k==="checked"&&tag==="input"){el.checked=v;}
    else if(k==="value"&&(tag==="input"||tag==="textarea")){el.value=v!==undefined?v:"";}
    else if(k==="type"&&tag==="input"){el.type=v;}
    else if(k==="placeholder"){el.placeholder=v;}
    else if(k==="min"||k==="max"||k==="step"){el[k]=v;}
    else if(k==="rows"){el.rows=v;}
    else{el.setAttribute(k,v);}
  });
  children.flat(Infinity).forEach(c=>{
    if(c===null||c===undefined||c===false) return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
};

const gradBtn=(text,onClick,extraStyle={})=>h("button",{style:{background:grad,border:"none",borderRadius:"10px",padding:"8px 16px",color:WHITE,fontWeight:"700",cursor:"pointer",...extraStyle},onClick},text);

function checkList(items,checked,onToggle){
  return h("div",{style:{display:"flex",flexDirection:"column",gap:"6px"}},
    items.map((item,i)=>{
      const lbl=h("label",{style:{display:"flex",alignItems:"center",gap:"8px",cursor:"pointer",fontSize:"14px"}});
      const cb=h("input",{type:"checkbox",checked:!!checked?.[i],style:{accentColor:PINK,width:"16px",height:"16px"}});
      cb.addEventListener("change",()=>onToggle(i));
      const sp=h("span",{style:{textDecoration:checked?.[i]?"line-through":"none",color:checked?.[i]?GRAY:"#1f2937"}},item);
      lbl.appendChild(cb); lbl.appendChild(sp); return lbl;
    })
  );
}

function todoList(todos,onUpdate){
  const wrap=h("div",{});
  const row=h("div",{style:{display:"flex",gap:"8px",marginBottom:"10px"}});
  const inp=h("input",{type:"text",placeholder:"+",style:{flex:"1",padding:"8px 12px",borderRadius:"10px",border:`1.5px solid ${PINK}55`,fontSize:"14px",outline:"none"}});
  const addBtn=gradBtn("+",()=>{
    if(inp.value.trim()){onUpdate([...todos,{text:inp.value.trim(),done:false}]);inp.value="";}
  });
  row.appendChild(inp); row.appendChild(addBtn);
  wrap.appendChild(row);
  todos.forEach((t,i)=>{
    const item=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"6px 0",borderBottom:`1px solid ${PINK}22`}});
    const cb=h("input",{type:"checkbox",checked:t.done,style:{accentColor:PINK,width:"16px",height:"16px"}});
    cb.addEventListener("change",()=>{const n=[...todos];n[i]={...n[i],done:!n[i].done};onUpdate(n);});
    const sp=h("span",{style:{flex:"1",fontSize:"14px",textDecoration:t.done?"line-through":"none",color:t.done?GRAY:"#1f2937"}},t.text);
    const del=h("button",{style:{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:"16px"}},t.done?"×":"×");
    del.addEventListener("click",()=>onUpdate(todos.filter((_,j)=>j!==i)));
    item.appendChild(cb);item.appendChild(sp);item.appendChild(del);
    wrap.appendChild(item);
  });
  return wrap;
}

  tips.forEach((tip,i)=>tabRow.appendChild(pill(tip.t.split(" ").slice(0,2).join(" "),s.tipIdx===i,()=>setState({tipIdx:i}))));
  wrap.appendChild(tabRow);
  wrap.appendChild(card(h("div",{},[h("p",{style:{fontWeight:"800",fontSize:"15px",color:"#be185d",marginTop:"0"}},tips[s.tipIdx].t),h("p",{style:{fontSize:"14px",color:"#374151",lineHeight:"1.8",margin:"0"}},tips[s.tipIdx].b)])));
  const allCard=card(h("div",{},[
    h("p",{style:{fontWeight:"700",fontSize:"14px",color:VIOLET,marginTop:"0"}},tx("allTips")),
    ...tips.map((tip,i)=>{
      const row=h("div",{style:{padding:"9px 10px",borderRadius:"10px",background:s.tipIdx===i?"#fdf4ff":"transparent",border:`1.5px solid ${s.tipIdx===i?PINK+"55":"transparent"}`,cursor:"pointer",marginBottom:"5px"}});
      row.appendChild(h("p",{style:{margin:"0",fontWeight:"700",fontSize:"12px",color:VIOLET}},tip.t));
      row.appendChild(h("p",{style:{margin:"3px 0 0",fontSize:"11px",color:GRAY}},tip.b.slice(0,70)+"..."));
      row.addEventListener("click",()=>setState({tipIdx:i}));
      return row;
    }),
  ]));
  wrap.appendChild(allCard);
  return wrap;
}

function renderJournal(){
  const s=state;
  const wrap=h("div",{style:{padding:"1.5rem 1rem"}});
  wrap.appendChild(sectionTitle(tx("journalTitle")));
  const jquote={it:"Scrivi liberamente, senza giudicarti.",en:"Write freely, without judging yourself.",fr:"Écris librement, sans te juger.",ar:"اكتبي بحرية دون إصدار أحكام.",de:"Schreibe frei, ohne dich zu beurteilen.",es:"Escribe libremente, sin juzgarte.",pt:"Escreva livremente, sem se julgar.",nl:"Schrijf vrij, zonder jezelf te beoordelen."};
  const qc=h("div",{style:{background:gradS("#fce7f3","#ede9fe"),borderRadius:"14px",padding:"1rem",marginBottom:"1rem"}});
  qc.appendChild(h("p",{style:{margin:"0",fontSize:"14px",color:"#7c3aed",fontStyle:"italic"}},`"${jquote[s.lang]||jquote.en}"`));
  wrap.appendChild(qc);
  wrap.appendChild(card(h("div",{},[h("p",{style:{fontWeight:"700",fontSize:"14px",color:"#be185d",marginTop:"0"}},tx("myPages")),makeTextarea(s.journal,v=>setState({journal:v}),12,{minHeight:"280px"})])));
  const pCard=card(h("div",{},[h("p",{style:{fontWeight:"700",fontSize:"13px",color:VIOLET,marginTop:"0"}},tx("journalPrompts")),
    ...JP().map(p=>{
      const row=h("div",{style:{padding:"8px 10px",borderRadius:"10px",background:"#fdf4ff",border:`1px solid ${PINK}33`,fontSize:"13px",color:"#374151",cursor:"pointer",marginBottom:"5px"}},p);
      row.addEventListener("click",()=>setState({journal:(s.journal?s.journal+"\n\n":"")+p+"\n"}));
      return row;
    }),
  ]));
  wrap.appendChild(pCard);
  return wrap;
}

function renderStickers(){
  const s=state;
  const mquotes=MQ();
  const wrap=h("div",{style:{padding:"1.5rem 1rem"}});
  wrap.appendChild(sectionTitle(tx("stickerTitle")));

  const qcard=card(h("div",{},[
    h("p",{style:{fontWeight:"700",fontSize:"13px",color:"#7c3aed",marginTop:"0"}},tx("motivational")),
    ...mquotes.map(q=>h("div",{style:{padding:"9px 12px",borderRadius:"10px",background:"rgba(255,255,255,0.6)",border:`1px solid ${PINK}33`,marginBottom:"7px"}},h("p",{style:{margin:"0",fontSize:"13px",color:"#7c3aed",fontStyle:"italic",lineHeight:"1.6"}},`"${q}"`))),
  ]),{background:gradS("#fce7f3","#ede9fe"),border:"none"});
  wrap.appendChild(qcard);

  const chooseCard=card(h("div",{},[
    h("p",{style:{fontWeight:"700",fontSize:"13px",color:"#be185d",marginTop:"0"}},tx("chooseSticker")),
    (()=>{
      const g=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:"7px",marginBottom:"10px"}});
      STICKERS.forEach(s=>{
        const btn=h("button",{style:{fontSize:"22px",background:"#fdf4ff",border:`1.5px solid ${PINK}33`,borderRadius:"10px",padding:"7px 3px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}});
        btn.appendChild(document.createTextNode(s.e));
        btn.appendChild(h("span",{style:{fontSize:"8px",color:GRAY}},s.l));
        btn.addEventListener("click",()=>addSticker(s.e));
        g.appendChild(btn);
      });
      return g;
    })(),
  ]));
  wrap.appendChild(chooseCard);

  const wallCard=card(h("div",{},[
    h("p",{style:{fontWeight:"700",fontSize:"13px",color:VIOLET,marginTop:"0"}},`${tx("myWall")} (${s.stickWall.length} ${tx("achievements")}!)`),
    s.stickWall.length===0
      ? h("div",{style:{textAlign:"center",padding:"2rem",color:GRAY,fontSize:"13px"}},[h("p",{style:{fontSize:"36px",margin:"0 0 8px"}},"🌸"),tx("firstSticker")])
      : (()=>{
          const board=h("div",{style:{position:"relative",minHeight:"200px",background:"#fdf4ff",borderRadius:"10px",border:`1.5px solid ${PINK}33`,overflow:"hidden"}});
          s.stickWall.forEach(st=>{
            const el=h("div",{style:{position:"absolute",left:`${st.x}%`,top:`${st.y}%`,fontSize:"30px",cursor:"pointer",userSelect:"none",transform:"translate(-50%,-50%)"}},st.e);
            el.title=tx("clickRemove");
            el.addEventListener("click",()=>removeSticker(st.id));
            board.appendChild(el);
          });
          return board;
        })(),
    s.stickWall.length>0?h("p",{style:{fontSize:"11px",color:GRAY,textAlign:"center",marginBottom:"0"}},tx("clickRemove")):null,
  ]));
  wrap.appendChild(wallCard);
  return wrap;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────
function render(){
  saveAll();
  const s=state;
  const app=document.getElementById("app");
  app.innerHTML="";
  app.dir=s.lang==="ar"?"rtl":"ltr";

  // HEADER
  const header=h("div",{style:{background:gradS("#fce7f3","#ede9fe"),padding:"1rem",borderBottom:`2px solid ${PINK}22`,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:"0",zIndex:"200"}});
  header.appendChild(h("div",{},[
    h("h1",{style:{margin:"0",fontSize:"18px",fontWeight:"800",background:grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"🌸 Pole Life Planner 2026"),
    h("p",{style:{margin:"2px 0 0",fontSize:"11px",color:GRAY}},TX.appSub[s.lang]||TX.appSub.en),
  ]));
  const headerRight=h("div",{style:{display:"flex",gap:"8px",alignItems:"center",position:"relative"}});

  // Language picker
  const lpWrap=h("div",{style:{position:"relative"}});
  const lpBtn=h("button",{style:{background:WHITE,border:`1.5px solid ${PINK}44`,borderRadius:"10px",padding:"6px 10px",cursor:"pointer",fontSize:"16px",display:"flex",alignItems:"center",gap:"4px"}});
  lpBtn.appendChild(document.createTextNode(LANGS[s.lang].flag+" "));
  lpBtn.appendChild(h("span",{style:{fontSize:"11px",color:GRAY}},LANGS[s.lang].name));
  lpBtn.addEventListener("click",()=>setState({showLP:!s.showLP}));
  lpWrap.appendChild(lpBtn);
  if(s.showLP){
    const dd=h("div",{style:{position:"absolute",top:"44px",right:"0",background:WHITE,border:`1.5px solid ${PINK}44`,borderRadius:"12px",padding:"8px",zIndex:"300",minWidth:"160px",boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}});
    Object.entries(LANGS).forEach(([code,l])=>{
      const btn=h("button",{style:{display:"flex",alignItems:"center",gap:"8px",width:"100%",padding:"8px 10px",borderRadius:"8px",border:"none",background:s.lang===code?grad:"transparent",color:s.lang===code?WHITE:"#374151",cursor:"pointer",fontSize:"13px",fontWeight:s.lang===code?"700":"400"}});
      btn.appendChild(h("span",{style:{fontSize:"18px"}},l.flag));
      btn.appendChild(document.createTextNode(l.name));
      btn.addEventListener("click",()=>setState({lang:code,showLP:false}));
      dd.appendChild(btn);
    });
    lpWrap.appendChild(dd);
  }
  headerRight.appendChild(lpWrap);

  const menuBtn=h("button",{style:{background:grad,border:"none",borderRadius:"10px",padding:"8px 14px",color:WHITE,fontWeight:"700",cursor:"pointer",fontSize:"18px"}},"☰");
  menuBtn.addEventListener("click",()=>setState({sideOpen:!s.sideOpen}));
  headerRight.appendChild(menuBtn);
  header.appendChild(headerRight);
  app.appendChild(header);

  // LAYOUT
  const layout=h("div",{style:{display:"flex"}});

  // SIDEBAR
  if(s.sideOpen){
    const SLS=SL();
    const sidebar=h("div",{style:{width:"200px",background:WHITE,borderRight:`1.5px solid ${PINK}33`,padding:"1rem 0.5rem",position:"fixed",top:"68px",bottom:"60px",overflowY:"auto",zIndex:"150"}});
    const SECS=[{id:"home",icon:"🌸"},{id:"annual",icon:"📅"},{id:"monthly",icon:"🗓"},{id:"daily",icon:"☀️"},{id:"pole",icon:"💫"},{id:"fitness",icon:"🧘"},{id:"nutrition",icon:"🥗"},{id:"body",icon:"💪"},{id:"goals",icon:"🎯"},{id:"goalquestions",icon:"❓"},{id:"mindset",icon:"🧠"},{id:"tips",icon:"✨"},{id:"journal",icon:"📝"},{id:"stickers",icon:"🌟"}];
    SECS.forEach(sec=>{
      const btn=h("button",{style:{display:"flex",alignItems:"center",gap:"8px",width:"100%",textAlign:"left",padding:"9px 10px",borderRadius:"10px",border:"none",cursor:"pointer",fontSize:"12px",background:s.section===sec.id?grad:"transparent",color:s.section===sec.id?WHITE:"#374151",fontWeight:s.section===sec.id?"700":"400",marginBottom:"2px"}});
      btn.appendChild(h("span",{style:{fontSize:"14px"}},sec.icon));
      btn.appendChild(document.createTextNode(SLS[sec.id]));
      btn.addEventListener("click",()=>setState({section:sec.id,sideOpen:false}));
      sidebar.appendChild(btn);
    });
    layout.appendChild(sidebar);
  }

  // CONTENT
  const content=h("div",{style:{flex:"1",paddingBottom:"80px"}});
  const secMap={home:renderHome,annual:renderCalendar,monthly:renderMonthly,daily:renderDaily,pole:renderPole,fitness:renderFitness,nutrition:renderNutrition,body:renderBody,goals:renderGoals,goalquestions:renderGoalQ,mindset:renderMindset,tips:renderTips,journal:renderJournal,stickers:renderStickers};
  const renderFn=secMap[s.section]||renderHome;
  content.appendChild(renderFn());
  layout.appendChild(content);
  app.appendChild(layout);

  // BOTTOM NAV
  const nav=h("div",{style:{position:"fixed",bottom:"0",left:"0",right:"0",background:WHITE,borderTop:`1.5px solid ${PINK}44`,display:"flex",justifyContent:"space-around",padding:"6px 0 10px",zIndex:"100"}});
  [{id:"home",icon:"🌸"},{id:"monthly",icon:"🗓"},{id:"daily",icon:"☀️"},{id:"pole",icon:"💫"},{id:"goals",icon:"🎯"}].forEach(b=>{
    const btn=h("button",{style:{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",padding:"4px 8px"}});
    btn.appendChild(h("span",{style:{fontSize:"22px",opacity:s.section===b.id?"1":"0.4"}},b.icon));
    if(s.section===b.id) btn.appendChild(h("div",{style:{width:"4px",height:"4px",borderRadius:"99px",background:PINK}}));
    btn.addEventListener("click",()=>setState({section:b.id}));
    nav.appendChild(btn);
  });
  app.appendChild(nav);
}

// ── INIT ──────────────────────────────────────────────────────────────
loadAll();
render();
</script>
</body>
</html>
